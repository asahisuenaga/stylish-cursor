<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylish Cursor - Custom Cursor for Google Docs</title>

  <!-- Include Inter font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- Custom CSS for styling -->
  <style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  padding: 14px;
  box-sizing: border-box;
  background: linear-gradient(145deg, #f0f2f5, #ffffff);
  color: #333;
  text-align: center;
  min-width: 400px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  backdrop-filter: blur(8px);
}

.header img {
  width: 40px;
  height: 40px;
  margin-right: 10px;
  filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.1));
}

.header h1 {
  font-size: 26px;
  font-weight: 600;
  margin: 0;
  color: #333;
}

/* Options Container */
.options-container label,
label {
  width: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 500;
  color: #333;
  font-size: 16px;
  margin-top: 12px;
}

/* Inputs & Selects */
select, input[type="text"], button {
  appearance: none;
  background: linear-gradient(145deg, #e8e8e8, #ffffff);
  border: 1px solid #d0d0d0;
  padding: 10px;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #333;
  cursor: pointer;
  width: 50%;
  box-shadow: inset 1px 1px 3px rgba(255,255,255,0.6),
              inset -1px -1px 3px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
}

select:hover, input[type="text"]:hover, button:hover {
  background: #f7f7f7;
}

select:focus, input[type="text"]:focus, button:focus {
  outline: none;
  border-color: #4A90E2;
  box-shadow: 0 0 6px rgba(74, 144, 226, 0.3);
}

/* Buttons */
button {
  background: linear-gradient(to top, #4A90E2, #6AB0F3);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 12px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s ease;
}

button:hover {
  box-shadow: 0 0 8px rgba(74, 144, 226, 0.4);
  filter: brightness(1.05);
}

/* Save & Redirect Buttons */
.save-button, .redirect-button {
  padding: 14px 24px;
  font-size: 16px;
  border-radius: 30px;
  width: 100%;
  margin-bottom: 12px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(6px);
  border: 2px solid #333;
  color: #333;
  font-weight: 500;
  transition: all 0.3s ease;
}

.save-button:hover, .redirect-button:hover {
  color: #4285F4;
  border-color: #4285F4;
  box-shadow: 0 0 10px rgba(66, 133, 244, 0.3);

}

/* Feedback & Show Love */
.maker-button {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 12px;
  color: #333;
  cursor: pointer;
  transition: transform 0.3s ease;
  box-shadow: none;
}

.maker-button:hover {
  text-decoration: underline;
  color: #7aaef7;
  box-shadow: none;
  background:transparent;
}

/* DARK MODE */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(145deg, #1b1b1b, #232323);
    color: #f5f5f5;
  }

  .header h1 {
    color: #f5f5f5;
  }

  .options-container label,
  label {
    color: #f5f5f5;
  }

  select, input[type="text"], button {
    background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
    border: 1px solid #444;
    color: #f5f5f5;
    box-shadow: inset 1px 1px 3px rgba(255,255,255,0.05),
                inset -1px -1px 3px rgba(0,0,0,0.4);
  }

  select:hover, input[type="text"]:hover, button:hover {
    background-color: #333;
  }

  select:focus, input[type="text"]:focus, button:focus {
    border-color: #4285F4;
    box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.4);
  }

  button {
    background: linear-gradient(to top, #4285F4, #5f9df7);
    color: #fff;
  }

  .save-button, .redirect-button {
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid #f5f5f5;
    color: #f5f5f5;
  }

  .save-button:hover, .redirect-button:hover {
    color: #4285F4;
    border-color: #4285F4;
  }

  .maker-button {
    color: #f5f5f5;
  }

  .maker-button:hover {
    color: #7aaef7;
  }
}
  </style>
</head>
<body>
  <!-- Header with icon and title -->
  <div class="header">
    <img src="icon128.png" alt="Icon">
    <h1 id="title"></h1>
  </div>

  <!-- Content with caret width and checkbox options -->
  <div class="content-container">
    <div class="options-container" id="optionsContainer">
      <label for="caretWidth">
        <span id="caretWidthLabel"></span>
        <select id="caretWidth">
          <option value="2">2 px</option>
          <option value="4">4 px</option>
          <option value="6">6 px</option>
          <option value="8">8 px</option>
        </select>
      </label>

    <label for="removeBlinkSelect">
      <span id="removeBlinkLabel"></span>
      <select id="removeBlinkSelect">
        <option value="true" data-i18n="trueOption">Yes</option>
        <option value="false" data-i18n="falseOption">No</option>
      </select>
    </label>

    <label for="gradientStyle">
      <span id="gradientLabel"></span>
      <select id="gradientStyle">
         <option value="dynamic"  data-i18n="gradientDynamic">Dynamic</option>
         <option value="rainbow" data-i18n="gradientRainbow">Rainbow</option>
         <option value="red" data-i18n="gradientRed">Red</option>
        <option value="snow" data-i18n="gradientSnow">Snow</option>
        <option value="ocean" data-i18n="gradientOcean">Ocean</option>
        <option value="forest" data-i18n="gradientForest">Forest</option>
        <option value="fire" data-i18n="gradientFire">Fire</option>
        <option value="ice" data-i18n="gradientIce">Ice</option>
        <option value="neon" data-i18n="gradientNeon">Neon</option>
        <option value="gold" data-i18n="gradientGold">Gold</option>
        <option value="silver" data-i18n="gradientSilver">Silver</option>
        <option value="twilight" data-i18n="gradientTwilight">Twilight</option>
        <option value="vintage" data-i18n="gradientVintage">Vintage</option>
        <option value="tropical" data-i18n="gradientTropical">Tropical</option>
        <option value="floral" data-i18n="gradientFloral">Floral</option>
        <option value="candy" data-i18n="gradientCandy">Candy</option>
      </select>
    </label>

  </div>

    <!-- Info message -->
    <div class="info-message" id="infoMessage">
      <p id="infoMessageText"></p>
    </div>

    <!-- Redirect message and button for Google Docs -->
    <div class="redirect-container" id="redirectContainer">
      <button class="redirect-button" id="redirectButton">
        <span id="openDocsButton"></span>
      </button>
    </div>
  </div>

<!-- Action buttons: Save, Show Some Love, and Feedback -->
<div class="action-buttons">
  <button class="save-button" id="saveButton"><span id="saveButton"></span></button>
  <button class="maker-button" id="maker"><span id="maker"></span></button>
</div>
  <script src="popup.js"></script>
</body>
</html>
